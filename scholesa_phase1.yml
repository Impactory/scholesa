name: SCHOLESA Phase 1 Verification

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  phase1_checks:
    name: Phase 1 Automated Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Static Analysis (Phase 1.1)
        # Spec: Zero warnings allowed.
        run: flutter analyze --fatal-warnings

      - name: Unit Testing (Phase 1.2)
        run: flutter test

      - name: Dependency Check (Phase 1.3)
        run: dart pub audit

      - name: Formatting (Phase 1.4)
        run: dart format --output=none --set-exit-if-changed .

      - name: Verify Audit Report Status
        run: |
          chmod +x scripts/verify_audit_pass.sh
          ./scripts/verify_audit_pass.sh