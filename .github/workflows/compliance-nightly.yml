name: COPPA Compliance Nightly

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

concurrency:
  group: compliance-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full RC2 regression chain
        env:
          VIBE_ENV: prod
        run: npm run rc2:regression

      - name: Run VIBE telemetry blocker gate
        env:
          VIBE_ENV: prod
        run: npm run qa:vibe-telemetry:blockers

      - name: Run compliance operator
        run: npm run compliance:gate

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-audit-pack-reports
          path: audit-pack/reports
          if-no-files-found: error
