name: COPPA Compliance Nightly

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

jobs:
  nightly-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run compliance operator
        run: COMPLIANCE_INCLUDE_RC2=1 npm run compliance:gate

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-audit-pack-reports
          path: audit-pack/reports
          if-no-files-found: warn
