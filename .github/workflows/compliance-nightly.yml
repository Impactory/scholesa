name: COPPA Compliance Nightly

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

concurrency:
  group: compliance-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-compliance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: npm ci

      - name: Validate required prod telemetry audit secrets
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          missing=0
          for key in GCP_SA_KEY_JSON GCP_PROJECT_ID; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret/env: $key"
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]] || exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Run full RC2 regression chain
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VIBE_ENV: prod
        run: npm run rc2:regression

      - name: Run VIBE telemetry blocker gate
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VIBE_ENV: prod
        run: npm run qa:vibe-telemetry:blockers

      - name: Run compliance operator
        run: npm run compliance:gate

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-audit-pack-reports
          path: audit-pack/reports
          if-no-files-found: error
