name: Release Validation

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-release-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Functions TypeScript build
        run: npm --prefix functions run build

      - name: Functions Gen 2 verification
        run: npm --prefix functions run verify:gen2

      - name: Flutter web build gate
        run: |
          cd apps/empire_flutter/app
          flutter pub get
          flutter build web --wasm --release --no-tree-shake-icons

      - name: Workflow no-mock audit
        run: npm run qa:workflow:no-mock

      - name: Big-bang release artifacts
        run: npm run qa:release:big-bang-docs

      - name: Build
        run: npm run build

      - name: Jest baseline
        run: npm run test

      - name: Jest rules integration
        run: npm run test:integration:rules

      - name: Web browser workflow E2E
        run: npm run test:e2e:web

      - name: Jest analytics integration
        run: npm run test:integration:analytics

      - name: Full RC2 regression chain
        env:
          VIBE_ENV: staging
        run: npm run rc2:regression

      - name: VIBE telemetry blocker gate
        env:
          VIBE_ENV: staging
        run: npm run qa:vibe-telemetry:blockers

      - name: COPPA compliance operator gate
        run: npm run compliance:gate

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-audit-pack-reports
          path: audit-pack/reports
          if-no-files-found: error

  platform-release-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: npm ci

      - name: Run full platform gates (no deploy)
        run: npm run flow:platform:gates
