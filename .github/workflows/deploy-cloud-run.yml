name: Build and Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      no_traffic:
        description: "Deploy new revisions without shifting traffic"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: npm ci

      - name: Validate required deploy secrets
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
          CLOUD_RUN_FLUTTER_SERVICE: ${{ secrets.CLOUD_RUN_FLUTTER_SERVICE }}
          CLOUD_RUN_COMPLIANCE_SERVICE: ${{ secrets.CLOUD_RUN_COMPLIANCE_SERVICE }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_ENABLE_SW: ${{ secrets.NEXT_PUBLIC_ENABLE_SW }}
          FIREBASE_SERVICE_ACCOUNT_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SECRET }}
        run: |
          missing=0
          for key in \
            GCP_SA_KEY_JSON \
            GCP_PROJECT_ID \
            GCP_REGION \
            CLOUD_RUN_SERVICE \
            CLOUD_RUN_FLUTTER_SERVICE \
            CLOUD_RUN_COMPLIANCE_SERVICE \
            NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
            NEXT_PUBLIC_FIREBASE_APP_ID \
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            NEXT_PUBLIC_ENABLE_SW \
            FIREBASE_SERVICE_ACCOUNT_SECRET; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret/env: $key"
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]] || exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify Artifact Registry push access
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          RESPONSE="$(curl -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://artifactregistry.googleapis.com/v1/projects/${GCP_PROJECT_ID}/locations/us/repositories/gcr.io:testIamPermissions" \
            -d '{"permissions":["artifactregistry.repositories.uploadArtifacts"]}')"

          if ! printf '%s' "$RESPONSE" | grep -q 'artifactregistry.repositories.uploadArtifacts'; then
            echo "Artifact Registry push preflight failed for gcr.io/${GCP_PROJECT_ID}."
            echo "Grant the deploy principal roles/artifactregistry.writer on the backing repository or project, and confirm the gcr.io repository exists in the us multi-region."
            echo "API response: $RESPONSE"
            exit 1
          fi

      - name: Verify Functions Gen 2 deployment baseline
        run: |
          npm --prefix functions run build
          npm --prefix functions run verify:gen2

      - name: Verify Flutter web artifact
        run: |
          cd apps/empire_flutter/app
          flutter pub get
          flutter build web --release --no-wasm-dry-run

      - name: Full RC2 regression chain
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VIBE_ENV: prod
        run: npm run rc2:regression

      - name: VIBE telemetry blocker gate
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VIBE_ENV: prod
        run: npm run qa:vibe-telemetry:blockers

      - name: Compliance regression gate
        run: npm run compliance:gate

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker --quiet

      - name: Build image and push to GCR
        env:
          IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/scholesa:${{ github.sha }}
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Build compliance operator image and push to GCR
        env:
          COMPLIANCE_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/scholesa-compliance:${{ github.sha }}
        run: |
          docker build -f Dockerfile.compliance -t $COMPLIANCE_IMAGE .
          docker push $COMPLIANCE_IMAGE

      - name: Build Flutter web image and push to GCR
        env:
          FLUTTER_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/empire-web:${{ github.sha }}
        run: |
          docker build -f Dockerfile.flutter -t $FLUTTER_IMAGE .
          docker push $FLUTTER_IMAGE

      - name: Deploy to Cloud Run
        env:
          IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/scholesa:${{ github.sha }}
          NO_TRAFFIC: ${{ github.event.inputs.no_traffic }}
        run: |
          NO_TRAFFIC_FLAG=""
          if [[ "$NO_TRAFFIC" == "true" ]]; then
            NO_TRAFFIC_FLAG="--no-traffic"
          fi
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE }} \
            --image "$IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            ${NO_TRAFFIC_FLAG} \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }},NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }},NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }},NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }},NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }},NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }},NEXT_PUBLIC_ENABLE_SW=${{ secrets.NEXT_PUBLIC_ENABLE_SW }}" \
            --update-secrets "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT_SECRET }}:latest"

      - name: Verify deployment
        run: |
          echo "Deployed to Cloud Run service: ${{ secrets.CLOUD_RUN_SERVICE }} (region ${{ secrets.GCP_REGION }})"

      - name: Deploy Flutter web to Cloud Run
        env:
          FLUTTER_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/empire-web:${{ github.sha }}
          NO_TRAFFIC: ${{ github.event.inputs.no_traffic }}
        run: |
          NO_TRAFFIC_FLAG=""
          if [[ "$NO_TRAFFIC" == "true" ]]; then
            NO_TRAFFIC_FLAG="--no-traffic"
          fi
          gcloud run deploy ${{ secrets.CLOUD_RUN_FLUTTER_SERVICE }} \
            --image "$FLUTTER_IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            ${NO_TRAFFIC_FLAG} \
            --allow-unauthenticated

      - name: Verify Flutter web deployment
        run: |
          echo "Deployed Flutter web to Cloud Run service: ${{ secrets.CLOUD_RUN_FLUTTER_SERVICE }} (region ${{ secrets.GCP_REGION }})"

      - name: Deploy compliance operator
        env:
          COMPLIANCE_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/scholesa-compliance:${{ github.sha }}
          COMPLIANCE_SERVICE: ${{ secrets.CLOUD_RUN_COMPLIANCE_SERVICE }}
          NO_TRAFFIC: ${{ github.event.inputs.no_traffic }}
        run: |
          SERVICE_NAME="${COMPLIANCE_SERVICE:-scholesa-compliance}"
          NO_TRAFFIC_FLAG=""
          if [[ "$NO_TRAFFIC" == "true" ]]; then
            NO_TRAFFIC_FLAG="--no-traffic"
          fi
          gcloud run deploy "$SERVICE_NAME" \
            --image "$COMPLIANCE_IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            ${NO_TRAFFIC_FLAG} \
            --no-allow-unauthenticated \
            --set-env-vars "COMPLIANCE_ALLOW_UNAUTH=0"

      - name: Verify compliance deployment
        env:
          COMPLIANCE_SERVICE: ${{ secrets.CLOUD_RUN_COMPLIANCE_SERVICE }}
        run: |
          SERVICE_NAME="${COMPLIANCE_SERVICE:-scholesa-compliance}"
          echo "Deployed compliance operator to Cloud Run service: $SERVICE_NAME (region ${{ secrets.GCP_REGION }})"
