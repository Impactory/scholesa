name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Jest baseline
        run: npm run test

      - name: Jest rules integration
        run: npm run test:integration:rules

      - name: Jest analytics integration
        run: npm run test:integration:analytics

      - name: Full RC2 regression chain
        env:
          VIBE_ENV: staging
        run: npm run rc2:regression

      - name: VIBE telemetry blocker gate
        env:
          VIBE_ENV: staging
        run: npm run qa:vibe-telemetry:blockers

      - name: COPPA compliance operator gate
        run: npm run compliance:gate

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-pack-reports
          path: audit-pack/reports
          if-no-files-found: error
