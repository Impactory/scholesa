name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/**

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('ci-{0}-{1}-{2}', github.workflow, github.ref, github.run_id) || format('ci-{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Functions TypeScript build
        run: npm --prefix functions run build

      - name: Functions Gen 2 verification
        run: npm --prefix functions run verify:gen2

      - name: Flutter analyze
        run: |
          cd apps/empire_flutter/app
          flutter pub get
          flutter analyze --no-fatal-infos

      - name: Flutter test
        run: |
          cd apps/empire_flutter/app
          flutter test

      - name: Flutter web build gate
        run: |
          cd apps/empire_flutter/app
          flutter build web --wasm --release --no-tree-shake-icons

      - name: Workflow no-mock audit
        run: npm run qa:workflow:no-mock

      - name: Big-bang release artifacts
        run: npm run qa:release:big-bang-docs

      - name: Build
        run: npm run build

      - name: Jest baseline
        run: npm run test

      - name: Jest rules integration
        run: npm run test:integration:rules

      - name: WCAG 2.2 AA browser audit
        run: npm run test:e2e:web:wcag

      - name: Web browser workflow E2E
        run: npm run test:e2e:web

      - name: Jest analytics integration
        run: npm run test:integration:analytics

      - name: Full RC2 regression chain
        env:
          VIBE_ENV: staging
        run: npm run rc2:regression

      - name: VIBE telemetry blocker gate
        env:
          VIBE_ENV: staging
        run: npm run qa:vibe-telemetry:blockers

      - name: COPPA compliance operator gate
        run: npm run compliance:gate

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-pack-reports
          path: audit-pack/reports
          if-no-files-found: error

  platform-gates:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: npm ci

      - name: Run full platform gates (no deploy)
        run: npm run flow:platform:gates

  deploy-readiness:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')))
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check deploy secret availability
        id: check
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
          CLOUD_RUN_FLUTTER_SERVICE: ${{ secrets.CLOUD_RUN_FLUTTER_SERVICE }}
          COMPLIANCE_RUN_SERVICE: ${{ secrets.CLOUD_RUN_COMPLIANCE_SERVICE }}
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=()
          for key in FIREBASE_TOKEN GCP_PROJECT_ID GCP_REGION CLOUD_RUN_SERVICE CLOUD_RUN_FLUTTER_SERVICE COMPLIANCE_RUN_SERVICE GCP_SA_KEY_JSON; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets available." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping platform-full; missing deploy secrets: ${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
          fi

  platform-full:
    needs: deploy-readiness
    if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')))) && needs.deploy-readiness.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      CLOUD_RUN_FLUTTER_SERVICE: ${{ secrets.CLOUD_RUN_FLUTTER_SERVICE }}
      COMPLIANCE_RUN_SERVICE: ${{ secrets.CLOUD_RUN_COMPLIANCE_SERVICE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: npm ci

      - name: Validate required deploy secrets
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=0
          for key in FIREBASE_TOKEN GCP_PROJECT_ID GCP_REGION CLOUD_RUN_SERVICE CLOUD_RUN_FLUTTER_SERVICE COMPLIANCE_RUN_SERVICE GCP_SA_KEY_JSON; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret/env: $key"
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]] || exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Run full platform gates (deploy handled by deploy workflow)
        run: npm run flow:platform:gates
