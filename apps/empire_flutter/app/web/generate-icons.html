<!DOCTYPE html>
<html>
<head>
  <title>Scholesa Icon Generator</title>
  <style>
    body { font-family: system-ui; padding: 40px; background: #1e293b; color: white; }
    canvas { display: block; margin: 20px 0; border: 1px solid #334155; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #10B981; border: none; color: white; border-radius: 8px; }
    .icons { display: flex; flex-wrap: wrap; gap: 20px; }
    .icon-item { text-align: center; }
  </style>
</head>
<body>
  <h1>Scholesa Icon Generator</h1>
  <p>PNG-only generator from authoritative launcher PNG source.</p>
  <div class="icons" id="icons"></div>

  <script>
    const sizes = [
      { name: 'favicon-16x16.png', size: 16 },
      { name: 'favicon-32x32.png', size: 32 },
      { name: 'Icon-192.png', size: 192 },
      { name: 'Icon-512.png', size: 512 },
      { name: 'Icon-maskable-192.png', size: 192, maskable: true },
      { name: 'Icon-maskable-512.png', size: 512, maskable: true },
    ];

    async function drawIcon(ctx, size, maskable = false) {
      const img = new Image();
      img.src = '../assets/icons/android/android-launchericon-512-512.png';

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
      });

      if (maskable) {
        const padding = Math.floor(size * 0.1);
        const inner = size - (padding * 2);
        ctx.fillStyle = '#0EA5E9';
        ctx.fillRect(0, 0, size, size);
        ctx.drawImage(img, padding, padding, inner, inner);
      } else {
        ctx.drawImage(img, 0, 0, size, size);
      }
    }

    const container = document.getElementById('icons');
    
    sizes.forEach(async ({ name, size, maskable }) => {
      const div = document.createElement('div');
      div.className = 'icon-item';
      
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      await drawIcon(ctx, size, maskable);
      
      const btn = document.createElement('button');
      btn.textContent = 'Download ' + name;
      btn.onclick = () => {
        const link = document.createElement('a');
        link.download = name;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      
      div.appendChild(canvas);
      div.appendChild(document.createElement('br'));
      div.appendChild(btn);
      container.appendChild(div);
    });
  </script>
</body>
</html>
