name: scholesa_app
description: Scholesa Education 2.0 Platform - K-9 Learning Studios
publish_to: 'none'
version: 1.0.0-rc.2+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  cloud_functions: ^6.0.6
  
  # SSO Authentication
  google_sign_in: ^7.2.0

  # State management
  provider: ^6.1.2
  
  # Routing
  go_router: ^17.1.0
  
  # Offline + local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.0.0
  
  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  google_fonts: ^8.0.2
  
  # Utils
  uuid: ^4.4.2
  http: ^1.2.2
  audioplayers: ^6.1.0
  record: ^6.0.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  shared_preferences: ^2.2.3
  equatable: ^2.0.5
  file_picker: ^10.3.10
  mime: ^2.0.0

  nested: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

# Platform launcher icons are synced from assets/icons/{android,ios,windows11}
# via scripts/sync_platform_icons.sh. Do not run flutter_launcher_icons here.

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/android/
    - assets/icons/ios/
    - assets/icons/windows11/
