name: scholesa_app
description: Scholesa Education 2.0 Platform - K-9 Learning Studios
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.5.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  cloud_functions: ^6.0.7
  
  # SSO Authentication
  google_sign_in: ^7.2.0

  # State management
  provider: ^6.1.5+1
  
  # Routing
  go_router: ^17.1.0
  
  # Offline + local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.0.0
  
  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  google_fonts: ^8.0.2
  
  # Utils
  uuid: ^4.4.2
  http: ^1.2.2
  flutter_svg: ^2.2.0
  audioplayers: ^6.6.0
  record: ^6.2.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  shared_preferences: ^2.5.4
  equatable: ^2.0.8
  file_picker: ^10.3.10
  mime: ^2.0.0
  web: ^1.1.1

  nested: any
  url_launcher: ^6.3.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.0.2+1
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  url_launcher_platform_interface: ^2.3.2

# Platform launcher icons are synced from assets/icons/{android,ios,windows11}
# via scripts/sync_platform_icons.sh. Do not run flutter_launcher_icons here.

flutter:
  uses-material-design: true

  assets:
    - assets/images/
