apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scholesa-web
  namespace: scholesa
  labels:
    app.kubernetes.io/name: scholesa-web
    app.kubernetes.io/part-of: scholesa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scholesa-web
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
