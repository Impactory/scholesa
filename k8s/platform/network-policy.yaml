apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scholesa-default-deny-ingress
  namespace: scholesa
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scholesa-public-web-ingress
  namespace: scholesa
spec:
  podSelector:
    matchExpressions:
      - key: scholesa.com/service-domain
        operator: In
        values:
          - web
          - flutter-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scholesa-internal-compliance-ingress
  namespace: scholesa
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scholesa-compliance
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
