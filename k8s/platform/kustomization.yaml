apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../web
  - flutter-web-service-account.yaml
  - flutter-web-deployment.yaml
  - flutter-web-service.yaml
  - flutter-web-hpa.yaml
  - flutter-web-pod-disruption-budget.yaml
  - compliance-service-account.yaml
  - compliance-configmap.yaml
  - compliance-deployment.yaml
  - compliance-service.yaml
  - compliance-hpa.yaml
  - compliance-pod-disruption-budget.yaml
  - network-policy.yaml
images:
  - name: scholesa-web
    newName: scholesa-web
    newTag: latest
  - name: scholesa-flutter-web
    newName: scholesa-flutter-web
    newTag: latest
  - name: scholesa-compliance
    newName: scholesa-compliance
    newTag: latest
