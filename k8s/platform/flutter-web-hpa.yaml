apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scholesa-flutter-web
  namespace: scholesa
  labels:
    app.kubernetes.io/name: scholesa-flutter-web
    app.kubernetes.io/part-of: scholesa
    scholesa.com/service-domain: flutter-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scholesa-flutter-web
  minReplicas: 3
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
