steps:
- name: 'node:24'
  id: 'ai-policy-gates'
  entrypoint: 'bash'
  args:
    - -lc
    - |
      if [[ ! -f package.json || ! -f package-lock.json || ! -f scripts/ai_egress_none.js || ! -f src/lib/ai/egressGuard.ts || ! -f functions/src/security/egressGuard.ts ]]; then
        echo "Skipping ai-policy-gates for minimal Flutter-only build context."
        exit 0
      fi
      npm ci
      npm run ai:internal-only:all
- name: 'gcr.io/cloud-builders/docker'
  id: 'docker-build'
  waitFor:
    - 'ai-policy-gates'
  args:
    - build
    - -f
    - Dockerfile.flutter
    - -t
    - gcr.io/studio-3328096157-e3f79/empire-web:${_TAG}
    - .
images:
  - gcr.io/studio-3328096157-e3f79/empire-web:${_TAG}
substitutions:
  _TAG: latest
