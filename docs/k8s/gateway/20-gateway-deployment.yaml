apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-gateway
  namespace: scholesa-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-gateway
  template:
    metadata:
      labels:
        app: inference-gateway
    spec:
      containers:
        - name: gateway
          image: REPLACE_WITH_GATEWAY_IMAGE # TODO
          ports:
            - containerPort: 8443
          env:
            - name: EXPECTED_AUDIENCE
              value: "https://inference.ENV.internal.scholesa" # TODO
            - name: ALLOWED_CALLERS
              value: "sa-scholesa-ai@PROJECT.iam.gserviceaccount.com,sa-scholesa-stt@PROJECT.iam.gserviceaccount.com,sa-scholesa-tts@PROJECT.iam.gserviceaccount.com"
            - name: LOG_LEVEL
              value: "info"
